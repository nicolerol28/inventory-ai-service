name: Evals

on:
  workflow_dispatch:

jobs:
  evals:
    name: Run eval suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run evals
        run: npm run test:evals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          INVENTORY_API_URL: ${{ secrets.INVENTORY_API_URL }}
          INVENTORY_DEMO_EMAIL: ${{ secrets.INVENTORY_DEMO_EMAIL }}
          INVENTORY_DEMO_PASSWORD: ${{ secrets.INVENTORY_DEMO_PASSWORD }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
